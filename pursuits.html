  <style>
    /* ── NUCLEAR LAYOUT OVERRIDES — Tailwind cannot touch these ── */
    /* Scroll wrapper handles overflow-x. Inner row is overflow:visible. */
    .gallery-scroll {
      overflow-x: auto !important;
      overflow-y: visible !important;
      width: 100% !important;
      padding: 36px 0 64px 0 !important; /* vertical padding = tilt headroom */
      scrollbar-width: none !important;
      -ms-overflow-style: none !important;
    }
    .gallery-scroll::-webkit-scrollbar { display: none !important; }
    .gallery-row {
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: nowrap !important;
      overflow: visible !important;
      align-items: flex-start !important;
      gap: 20px !important;
      padding: 0 40px !important;
      width: max-content !important;
      min-width: 100% !important;
      box-sizing: border-box !important;
    }

    .gallery-section {
      overflow: visible !important;
      margin-bottom: 4rem !important;
    }

    /* ── TITLE CARDS ── */
    .title-card {
      flex-shrink: 0 !important;
      width: 280px !important;
      height: 480px !important;
      border-radius: 16px !important;
      background: #f3f4f6 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      position: relative !important;
      transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1) !important;
    }
    .title-card:hover { transform: scale(1.025) !important; }
    .dark .title-card { background: #1f2937 !important; }

    /* ── TILT OUTER WRAPPER — gets the 3D transform, NO overflow:hidden ── */
    .tilt-wrap {
      flex-shrink: 0 !important;
      position: relative !important;
      overflow: visible !important;   /* CRITICAL — never clips the tilted card */
      will-change: transform !important;
      cursor: pointer !important;
      border-radius: 16px !important;
    }

    /* ── PHOTO INNER — clips the image with rounded corners ── */
    .photo-inner {
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
      border-radius: 16px !important;
      position: relative !important;
    }

    .photo-inner img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important;
      transition: transform 0.65s ease !important;
      user-select: none !important;
      pointer-events: none !important;
      -webkit-user-drag: none !important;
    }
    .tilt-wrap:hover .photo-inner img {
      transform: scale(1.055) !important;
    }

    /* scrollbar hidden */
    .horizontal-scroll { scrollbar-width: none; }
    .horizontal-scroll::-webkit-scrollbar { display: none; }

    /* dark mode title text */
    .dark .title-card h2 { color: white !important; }

  <script>
    function navigateToHome() { window.location.href = 'index.html#home'; }
    function navigateToSection(s) { window.location.href = 'index.html#' + s; }

    // Navbar scroll effect
    const navbar = document.getElementById('navbar');
    function updateNavbar() {
      if (window.scrollY === 0) {
        navbar.classList.remove('bg-white/80','backdrop-blur','dark:bg-black/80');
        navbar.classList.add('bg-transparent');
      } else {
        navbar.classList.add('bg-white/80','backdrop-blur','dark:bg-black/80');
        navbar.classList.remove('bg-transparent');
      }
    }
    window.addEventListener('scroll', updateNavbar);
    window.addEventListener('load', updateNavbar);

    // Dark mode
    document.getElementById('dm-toggle').addEventListener('click', function() {
      document.documentElement.classList.toggle('dark');
    });

    document.getElementById('year').textContent = new Date().getFullYear();

    // ── TILT EFFECT ──────────────────────────────────────────
    (function () {
      var MAX = 7;    // max tilt degrees
      var SC  = 1.035; // hover lift scale
      var LRP = 0.09;  // lerp smoothness

      function lerp(a, b, t) { return a + (b - a) * t; }

      document.querySelectorAll('.tilt-wrap').forEach(function (wrap) {
        // Ensure wrap and all ancestors don't clip
        wrap.style.transformOrigin = 'center center';
        wrap.style.zIndex = '1';

        var rx = 0, ry = 0, sc = 1;
        var trx = 0, try_ = 0, tsc = 1;
        var raf = null;

        function tick() {
          rx  = lerp(rx,  trx,  LRP);
          ry  = lerp(ry,  try_, LRP);
          sc  = lerp(sc,  tsc,  LRP);
          // perspective on the parent creates the 3D space cleanly
          wrap.style.transform =
            'perspective(900px) rotateX(' + rx.toFixed(3) + 'deg) rotateY(' + ry.toFixed(3) + 'deg) scale(' + sc.toFixed(4) + ')';
          var done =
            Math.abs(rx - trx)  < 0.004 &&
            Math.abs(ry - try_) < 0.004 &&
            Math.abs(sc - tsc)  < 0.0004;
          if (done) { raf = null; }
          else      { raf = requestAnimationFrame(tick); }
        }

        function kick() { if (!raf) raf = requestAnimationFrame(tick); }

        wrap.addEventListener('mouseenter', function () {
          wrap.style.zIndex = '10'; // lift above siblings
        });

        wrap.addEventListener('mousemove', function (e) {
          var r = wrap.getBoundingClientRect();
          var xp = (e.clientX - r.left)  / r.width  - 0.5; // -0.5 to +0.5
          var yp = (e.clientY - r.top)   / r.height - 0.5;
          trx  = -yp * MAX * 2;  // top cursor → card tilts away (negative X rotation)
          try_ =  xp * MAX * 2;  // right cursor → card tilts right (positive Y rotation)
          tsc  = SC;
          kick();
        });

        wrap.addEventListener('mouseleave', function () {
          wrap.style.zIndex = '1';
          trx = 0; try_ = 0; tsc = 1;
          kick();
        });
      });
    })();
  </script>
